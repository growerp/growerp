targets:
  $default:
    sources:
      exclude:
        # Exclude the Flutter ephemeral and plugin symlink directories in examples.
        # These contain generated plugin code with annotations (e.g. @HostApi, @GenerateMocks)
        # that json_serializable/freezed cannot resolve and should never process.
        - example/**
        - '**/ephemeral/**'
        - '**/.plugin_symlinks/**'
