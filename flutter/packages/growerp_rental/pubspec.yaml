name: growerp_rental
resolution: workspace
description: Date-range rental building block for the GrowERP system, providing the rental Gantt timeline, seasonal rate management and rental statistics shared by the hotel and rental verticals.
version: 1.0.0
homepage: https://www.growerp.com
repository: https://github.com/growerp/growerp
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.10.0
  flutter: ^3.33.0

dependencies:
  flutter:
    sdk: flutter
  growerp_core: ^1.9.0
  growerp_models: ^1.11.6
  growerp_inventory: ^1.9.0
  growerp_order_accounting: ^1.9.0
  growerp_adk: ^1.0.0
  flutter_bloc: ^9.1.1
  horizontal_data_table: ^4.3.1
  intl: ^0.20.2
  decimal: ^3.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
