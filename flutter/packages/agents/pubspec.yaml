name: agents
resolution: workspace
description: "GrowERP Agents — AI agents, agent governance (chat, jobs, approvals, action audit) plus organization (company, employees, website) and system setup."
version: 1.16.31+1
repository: https://github.com/growerp/growerp
homepage: https://www.growerp.com
publish_to: none
environment:
  sdk: ^3.10.0
  flutter: ^3.33.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  growerp_core: ^1.9.0
  growerp_models: ^1.11.6
  growerp_adk: ^1.0.0
  growerp_user_company: ^1.9.0
  growerp_website: ^1.9.0
  global_configuration: ^2.0.0-nullsafety.1
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  package_info_plus: ^9.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.12

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/cfg/
    - packages/growerp_core/images/growerp.jpg
    - packages/growerp_core/images/growerpDark.jpg
    - packages/growerp_core/images/growerp100.png
    - packages/growerp_core/images/growerpDark100.png

msix_config:
  display_name: GrowERP-Agents
  publisher: CN=68EEF479-7015-49FC-9C60-33E5A2EB731C
  publisher_display_name: "AntWebsystems Co.,Ltd"
  identity_name: AntWebsystemsCo.LTD.GrowERP-Agents
  msix_version: 1.16.29.0
  logo_path: "assets/icon/icon.png"
  capabilities: internetClient
  store: true
