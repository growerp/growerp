description: A example project for growerp_manuf_liner.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.10.0
  flutter: ^3.33.0

dependencies:
  flutter:
    sdk: flutter
  growerp_manuf_liner: ^1.0.0
  growerp_manufacturing: ^1.0.0
  growerp_order_accounting: ^1.9.0
  growerp_catalog: ^1.9.0
