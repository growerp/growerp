name: growerp_project
publish_to: none
environment:
  sdk: ^3.9.0
workspace:
  - packages/admin
  - packages/assessment
  - packages/freelance
  - packages/growerp
  - packages/growerp_activity
  - packages/growerp_activity/example
  - packages/growerp_catalog
  - packages/growerp_catalog/example
  - packages/growerp_chat
  - packages/growerp_chat/example
  - packages/growerp_core
  - packages/growerp_core/example
  - packages/growerp_courses
  - packages/growerp_courses/example
  - packages/growerp_inventory
  - packages/growerp_inventory/example
  - packages/growerp_manufacturing
  - packages/growerp_manufacturing/example
  - packages/growerp_manuf_liner
  - packages/growerp_marketing
  - packages/growerp_marketing/example
  - packages/growerp_models
  - packages/growerp_order_accounting
  - packages/growerp_order_accounting/example
  - packages/growerp_outreach
  - packages/growerp_outreach/example
  - packages/growerp_sales
  - packages/growerp_sales/example
  - packages/growerp_user_company
  - packages/growerp_user_company/example
  - packages/growerp_website
  - packages/growerp_website/example
  - packages/health
  - packages/hotel
  - packages/support
  - packages/elearner
  - packages/website
dev_dependencies:
  melos: ^7.4.0

melos:
  name: growerp
  repository: https://github.com/growerp/growerp

  # packages also determine the order of test
  packages:
    - packages/growerp_models
    - packages/growerp_core
    - packages/growerp_core/example
    - packages/growerp_chat
    - packages/growerp_chat/example
    - packages/growerp_user_company
    - packages/growerp_user_company/example
    - packages/growerp_catalog
    - packages/growerp_catalog/example
    - packages/growerp_inventory
    - packages/growerp_inventory/example
    - packages/growerp_manufacturing
    - packages/growerp_manufacturing/example
    - packages/growerp_manuf_liner
    - packages/growerp_sales
    - packages/growerp_sales/example
    - packages/growerp_order_accounting
    - packages/growerp_order_accounting/example
    - packages/growerp_website
    - packages/growerp_website/example
    - packages/growerp_activity
    - packages/growerp_activity/example
    - packages/growerp_marketing
    - packages/growerp_marketing/example
    - packages/growerp_outreach
    - packages/growerp_outreach/example
    - packages/growerp_courses
    - packages/growerp_courses/example
    - packages/growerp
    - packages/admin
    - packages/website
    - packages/hotel
    - packages/freelance
    - packages/assessment
    - packages/health
    - packages/support
    - packages/elearner

  command:
    bootstrap:
      runPubGetInParallel: false

  scripts:
    analyze:
      exec: dart analyze .
      description: Analyse all packages for possible problems.
    build:
      description: build_runner build all modules.
      run: dart run build_runner build --delete-conflicting-outputs
      exec:
        concurrency: 1
      packageFilters:
        dependsOn: build_runner
    buildclean:
      description: build_runner clean.
      exec: flutter clean && dart run build_runner clean
      packageFilters:
        dependsOn: build_runner
    watch:
      description: watch package.
      exec: dart run build_runner watch
      packageFilters:
        dependsOn: build_runner
    l10n:
      description: Generates l10n for all app packages.
      exec: flutter gen-l10n --suppress-analytics
      packageFilters:
        fileExists: "l10n.yaml"
    test_package:
      description: run all integration tests. Set BACKEND_PORT env var to override default 8080.
      exec:
        concurrency: 1
      run: for f in integration_test/*.dart; do flutter test "$f" --dart-define=BACKEND_PORT=${BACKEND_PORT:-8080} || exit 1; done
      packageFilters:
        dirExists: "integration_test"
        scope: "*_example"
    test:
      description: run all app and package tests. Set BACKEND_PORT or BACKEND_URL env var to override defaults.
      exec:
        concurrency: 1
      run: |
        FAIL=0; for f in integration_test/*.dart; do flutter test "$f" --dart-define=BACKEND_PORT=${BACKEND_PORT:-8080} --dart-define=BACKEND_URL=${BACKEND_URL:-} --dart-define=CHAT_URL=${CHAT_URL:-} --dart-define=SCREEN_WIDTH=${SCREEN_WIDTH:-0} --dart-define=SCREEN_HEIGHT=${SCREEN_HEIGHT:-0} || FAIL=1; done; exit $FAIL
      packageFilters:
        dirExists: "integration_test"
    test-headless:
      description: run all app and package tests in headless mode on Linux desktop (via xvfb).
      exec:
        concurrency: 1
      run: |
        FAIL=0; for f in integration_test/*.dart; do flutter test "$f" -d linux --dart-define=BACKEND_URL=${BACKEND_URL:-http://moqui} --dart-define=CHAT_URL=${CHAT_URL:-ws://moqui} --dart-define=SCREEN_WIDTH=${SCREEN_WIDTH:-412} --dart-define=SCREEN_HEIGHT=${SCREEN_HEIGHT:-732} || FAIL=1; done; exit $FAIL
      packageFilters:
        dirExists: "integration_test"
