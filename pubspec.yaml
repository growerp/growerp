name: hotel
version: 0.0.1+1
publish_to: none

environment:
  sdk: '>=2.12.0 <3.0.0'

dependencies:
  flutter: 
    sdk: flutter
  flutter_localizations:
        sdk: flutter
  global_configuration: ^2.0.0-nullsafety.0
  equatable: ^2.0.0
  dio: ^4.0.0
  flutter_bloc: ^7.0.0
  meta: ^1.3.0
  shared_preferences: ^2.0.5
  image_picker: ^0.7.4
  image_picker_for_web: ^2.0.0
  about: ^2.0.0
  animations: ^2.0.0
  responsive_framework: ^0.1.0
  date_utils: ^0.2.0
  core:
#    path: ../packages/core
    git:
      url: https://github.com/growerp/growerp.git
      ref: packages
      path: core
  models:
    path: ../packages/models

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.0.3
  bloc_test: ^8.0.0
  flutter_launcher_icons: ^0.9.0
# to run icons: flutter pub run flutter_launcher_icons:main 
flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/growerp.jpg"

flutter:
  uses-material-design: true
# from https://www.flaticon.com/
  assets:
    - assets/images/
    - assets/cfg/
    - assets/
    - ./
