name: Integration Tests

# Run headless Flutter integration tests on Linux desktop.
# Tests use Docker Compose for the Moqui backend + PostgreSQL,
# and xvfb for a virtual display.
#
# Full runs split across 4 parallel slices on separate runners, each with its own
# Moqui + PostgreSQL. Tests are self-contained — each creates its own company/admin,
# so slices don't interfere with each other.
#
# Runs daily at 12 PM Bangkok time (05:00 UTC) — only if there were commits that day.
# Can also be triggered manually via workflow_dispatch.

on:
  schedule:
    # 12 PM Bangkok time (UTC+7) = 05:00 UTC — only runs if there were commits that day
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      package_filter:
        description: 'Only test packages matching this string (e.g. "catalog"). Leave empty for all 4 slices.'
        required: false
        default: ""

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # 0. Change detection — skip scheduled runs with no recent changes
  # ------------------------------------------------------------------
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.detect.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%S')
            COUNT=$(git log --since="$SINCE" --oneline -- \
              'flutter/**' 'moqui/runtime/component/**' | wc -l)
            if [ "$COUNT" -gt 0 ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "$COUNT commit(s) with relevant changes found."
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "No relevant changes in the last 24 hours — skipping tests."
            fi
          fi

  # ------------------------------------------------------------------
  # 1. Integration tests
  #    Full run: 4 parallel slices, each with its own Moqui backend.
  #    Filtered run (package_filter set): single job using PACKAGE_FILTER.
  # ------------------------------------------------------------------
  integration-tests:
    needs: check-changes
    if: needs.check-changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        # Use a single slice when package_filter is set; otherwise run all 4.
        slice: ${{ fromJSON(github.event.inputs.package_filter && '[1]' || '[1,2,3,4]') }}

    steps:
      # ------------------------------------------------------------------
      # 1. Free disk space
      # GitHub runners ship with Android SDK, .NET, Haskell etc. that consume
      # ~15 GB we don't need. Remove them before pulling the Flutter image.
      # ------------------------------------------------------------------
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo docker image prune -af
          df -h

      # ------------------------------------------------------------------
      # 2. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules (SSH → HTTPS rewrite)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - name: Set up backend component symlinks
        run: bash setup-backend.sh

      # ------------------------------------------------------------------
      # 3. Build moqui backend image from local source
      # ------------------------------------------------------------------
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build moqui backend image
        run: |
          mkdir -p moqui/build
          cd moqui && ./gradlew build getPostgresJdbc
          cd docker/simple && bash docker-build.sh ../.. growerp/growerp-moqui eclipse-temurin:21-jdk

      # ------------------------------------------------------------------
      # 4. Build test runner image (cached via Docker layer cache)
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test runner image
        uses: docker/build-push-action@v5
        with:
          context: flutter
          file: flutter/ci/Dockerfile
          load: true
          tags: growerp/flutter-test-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------
      # 5. Start backend services
      # ------------------------------------------------------------------
      - name: Start Moqui backend
        working-directory: flutter
        run: docker compose -f ci/docker-compose-test.yml up -d moqui-database moqui

      - name: Wait for Moqui to be healthy
        working-directory: flutter
        run: |
          echo "Waiting for Moqui backend..."
          TIMEOUT=180
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if docker compose -f ci/docker-compose-test.yml exec -T moqui \
                curl -sf http://localhost/status 2>/dev/null; then
              echo "Moqui is ready"
              break
            fi
            echo "Waiting... ($ELAPSED/$TIMEOUT seconds)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "ERROR: Moqui not ready after $TIMEOUT seconds"
            docker compose -f ci/docker-compose-test.yml logs moqui
            exit 1
          fi

      # ------------------------------------------------------------------
      # 6. Run integration tests
      # ------------------------------------------------------------------
      - name: Run integration tests (slice ${{ matrix.slice }})
        working-directory: flutter
        env:
          PACKAGE_FILTER: ${{ github.event.inputs.package_filter || '' }}
          # Set PACKAGE_SLICE only for full (unfiltered) runs.
          PACKAGE_SLICE: ${{ !github.event.inputs.package_filter && format('{0}/4', matrix.slice) || '' }}
        run: |
          PACKAGE_FILTER="$PACKAGE_FILTER" PACKAGE_SLICE="$PACKAGE_SLICE" \
            docker compose -f ci/docker-compose-test.yml up \
              --exit-code-from sut sut 2>&1 | tee /tmp/test_output.log
          echo "TEST_EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # 7. Per-slice results
      # ------------------------------------------------------------------
      - name: Test results summary (slice ${{ matrix.slice }})
        if: always()
        run: |
          echo "## Test Results — Slice ${{ matrix.slice }}/4" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/test_output.log ]; then
            if grep -q '=== FINAL TEST SUMMARY' /tmp/test_output.log; then
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              grep '>>> RESULT:' /tmp/test_output.log >> "$GITHUB_STEP_SUMMARY" || true
              echo "" >> "$GITHUB_STEP_SUMMARY"
              sed -n '/=== FINAL TEST SUMMARY/,$ p' /tmp/test_output.log | head -100 \
                >> "$GITHUB_STEP_SUMMARY" || true
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            else
              # Package-filter or legacy format
              FAILED=$(grep -cE ' FAILED$|\[E\]' /tmp/test_output.log || true)
              if [ "$FAILED" = "0" ]; then
                echo "All tests passed." >> "$GITHUB_STEP_SUMMARY"
              else
                echo "**$FAILED failure(s) detected:**" >> "$GITHUB_STEP_SUMMARY"
                echo '```' >> "$GITHUB_STEP_SUMMARY"
                grep -E ' FAILED$|\[E\]' /tmp/test_output.log >> "$GITHUB_STEP_SUMMARY" || true
                echo '```' >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-${{ matrix.slice }}
          path: /tmp/test_output.log
          retention-days: 7

      # ------------------------------------------------------------------
      # 8. Cleanup
      # ------------------------------------------------------------------
      - name: Tear down Docker services
        if: always()
        working-directory: flutter
        run: docker compose -f ci/docker-compose-test.yml down -v

  # ------------------------------------------------------------------
  # 2. Combined summary across all slices
  # ------------------------------------------------------------------
  summarize:
    needs: integration-tests
    if: always() && needs.integration-tests.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Download all test logs
        uses: actions/download-artifact@v4
        with:
          pattern: test-output-*
          path: test-logs/

      - name: Combined summary
        run: |
          {
          echo "## Overall Test Results"
          echo '```'
          TOTAL_FAILED_PKGS=0
          TOTAL_PASSED_PKGS=0
          TOTAL_IND_PASSED=0
          TOTAL_IND_FAILED=0
          for slice_dir in $(ls -d test-logs/test-output-* 2>/dev/null | sort -V); do
            SLICE=$(basename "$slice_dir" | grep -o '[0-9]*$')
            LOG="$slice_dir/test_output.log"
            if [ -f "$LOG" ]; then
              echo "--- Slice $SLICE ---"
              grep '>>> RESULT:' "$LOG" | grep -v '+ echo' | sed 's/^[^|]*| *//' \
                || echo "  (no structured results)"
              FAILED=$(grep '>>> RESULT:.*FAILED' "$LOG" | grep -v '+ echo' | wc -l)
              PASSED=$(grep '>>> RESULT:.*PASSED' "$LOG" | grep -v '+ echo' | wc -l)
              TOTAL_FAILED_PKGS=$((TOTAL_FAILED_PKGS + FAILED))
              TOTAL_PASSED_PKGS=$((TOTAL_PASSED_PKGS + PASSED))
              IND_PASSED=$(grep 'Tests passed' "$LOG" | sed 's/^[^|]*| *//' | grep -oE '[0-9]+$' | tail -1)
              IND_FAILED=$(grep 'Tests failed' "$LOG" | sed 's/^[^|]*| *//' | grep -oE '[0-9]+$' | tail -1)
              TOTAL_IND_PASSED=$((TOTAL_IND_PASSED + ${IND_PASSED:-0}))
              TOTAL_IND_FAILED=$((TOTAL_IND_FAILED + ${IND_FAILED:-0}))
            fi
          done
          echo ""
          echo "Packages passed : $TOTAL_PASSED_PKGS"
          echo "Packages failed : $TOTAL_FAILED_PKGS"
          echo "Tests passed    : $TOTAL_IND_PASSED"
          echo "Tests failed    : $TOTAL_IND_FAILED"
          if [ "$TOTAL_FAILED_PKGS" -eq 0 ]; then
            echo ""
            echo "All packages passed!"
          else
            echo ""
            echo "Failed tests:"
            {
              for slice_dir in $(ls -d test-logs/test-output-* 2>/dev/null | sort -V); do
                LOG="$slice_dir/test_output.log"
                [ -f "$LOG" ] && sed 's/^[^|]*| *//' "$LOG" | grep -E '^\[[^]]+\] ' || true
              done
            } | sort -u
          fi
          echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
