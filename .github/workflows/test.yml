name: Integration Tests

# Run headless Flutter integration tests on Linux desktop.
# Tests use Docker Compose for the Moqui backend + PostgreSQL,
# and xvfb for a virtual display.

on:
  push:
    branches: [master, development]
    paths:
      - 'flutter/**'
      - 'moqui/runtime/component/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [master]
    paths:
      - 'flutter/**'
      - 'moqui/runtime/component/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:
    inputs:
      package_filter:
        description: 'Only test packages matching this string (e.g. "catalog"). Leave empty for all.'
        required: false
        default: ''

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Build test runner image (cached via Docker layer cache)
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test runner image
        uses: docker/build-push-action@v5
        with:
          context: flutter
          file: flutter/ci/Dockerfile
          load: true
          tags: growerp/flutter-test-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ------------------------------------------------------------------
      # 3. Start backend services
      # ------------------------------------------------------------------
      - name: Start Moqui backend
        working-directory: flutter
        run: |
          docker compose -f ci/docker-compose-test.yml up -d moqui-database moqui

      - name: Wait for Moqui to be healthy
        working-directory: flutter
        run: |
          echo "Waiting for Moqui backend..."
          TIMEOUT=180
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if docker compose -f ci/docker-compose-test.yml exec -T moqui \
                curl -sf http://localhost/status 2>/dev/null; then
              echo "Moqui is ready"
              break
            fi
            echo "Waiting... ($ELAPSED/$TIMEOUT seconds)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "ERROR: Moqui not ready after $TIMEOUT seconds"
            docker compose -f ci/docker-compose-test.yml logs moqui
            exit 1
          fi

      # ------------------------------------------------------------------
      # 4. Run integration tests
      # ------------------------------------------------------------------
      - name: Run integration tests
        working-directory: flutter
        env:
          PACKAGE_FILTER: ${{ github.event.inputs.package_filter || '' }}
        run: |
          PACKAGE_FILTER="$PACKAGE_FILTER" \
            docker compose -f ci/docker-compose-test.yml up \
              --exit-code-from sut sut 2>&1 | tee /tmp/test_output.log
          echo "TEST_EXIT_CODE=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------
      # 5. Report results
      # ------------------------------------------------------------------
      - name: Test failure summary
        if: always()
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/test_output.log ]; then
            FAILED=$(grep -cE ' FAILED$|\[E\]' /tmp/test_output.log || true)
            if [ "$FAILED" = "0" ]; then
              echo "All tests passed." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "**$FAILED failure(s) detected:**" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              grep -E ' FAILED$|\[E\]' /tmp/test_output.log >> "$GITHUB_STEP_SUMMARY" || true
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: /tmp/test_output.log
          retention-days: 7

      # ------------------------------------------------------------------
      # 6. Cleanup
      # ------------------------------------------------------------------
      - name: Tear down Docker services
        if: always()
        working-directory: flutter
        run: docker compose -f ci/docker-compose-test.yml down -v
