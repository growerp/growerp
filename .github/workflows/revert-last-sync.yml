name: Revert Production Update

on:
  workflow_dispatch:

concurrency:
  group: revert-last-sync
  cancel-in-progress: false

jobs:
  revert:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Revert last sync on growerp.com
        uses: appleboy/ssh-action@v1
        with:
          host: growerp.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: swarm/revert-prod.sh
          
