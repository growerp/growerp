name: Update Staging

# Manually trigger a staging update from GitHub Actions.
# No extra secrets needed — GITHUB_TOKEN is used for both git push and ghcr.io.
# Required repository / organisation settings:
#   Settings → Actions → General → Workflow permissions → "Read and write permissions"
#   Settings → Packages → "Inherit access from repository" (so the image is published)

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type. Use 'none' to push images at the current version without a version commit."
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - none
      apps:
        description: "Comma-separated list of apps to build (blank = all: admin,elearner,freelance,health,hotel,support,growerp-moqui)"
        required: false
        default: ""
      comment:
        description: "Optional comment added to the git commit (ignored when bump is 'none')"
        required: false
        default: ""

# Only one update-staging at a time — never cancel a running update.
concurrency:
  group: update-staging
  cancel-in-progress: false

permissions:
  contents: write # required for git push / tag
  packages: write # required to push to ghcr.io

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Bump version files only — no git commit, no docker build yet.
  #    Bumped pubspecs are uploaded as an artifact for all build-image jobs.
  # ───────────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      flutter_apps: ${{ steps.resolve-apps.outputs.flutter_apps }}
      include_moqui: ${{ steps.resolve-apps.outputs.include_moqui }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve app list
        id: resolve-apps
        run: |
          INPUT="${{ inputs.apps }}"
          ALL_FLUTTER="admin elearner freelance health hotel support"
          if [ -z "$INPUT" ]; then
            FLUTTER_APPS="$ALL_FLUTTER"
            INCLUDE_MOQUI=true
          else
            FLUTTER_LIST=""
            INCLUDE_MOQUI=false
            IFS=',' read -ra APPS <<< "$INPUT"
            for app in "${APPS[@]}"; do
              app=$(echo "$app" | xargs)
              if [ "$app" = "growerp-moqui" ]; then
                INCLUDE_MOQUI=true
              else
                FLUTTER_LIST="$FLUTTER_LIST $app"
              fi
            done
            FLUTTER_APPS="${FLUTTER_LIST# }"
          fi
          JSON=$(echo "$FLUTTER_APPS" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -sc .)
          echo "flutter_apps=$JSON" >> $GITHUB_OUTPUT
          echo "include_moqui=$INCLUDE_MOQUI" >> $GITHUB_OUTPUT

      - uses: dart-lang/setup-dart@v1

      - name: Install dcli
        run: dart pub global activate dcli

      - name: Resolve release tool dependencies
        run: dart pub get
        working-directory: flutter/release

      - name: Bump version files
        if: inputs.bump != 'none'
        working-directory: flutter
        run: dart release/release_tool.dart --ci --bump=${{ inputs.bump }} --workspace=local --no-push-docker --no-push-github

      - name: Upload bumped pubspecs
        if: inputs.bump != 'none'
        uses: actions/upload-artifact@v4
        with:
          name: bumped-pubspecs
          path: flutter/**/pubspec.yaml

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Build and push Flutter app Docker images — all apps run in parallel
  # ───────────────────────────────────────────────────────────────────────────
  build-image:
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        app: ${{ fromJson(needs.prepare.outputs.flutter_apps) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Download bumped pubspecs
        if: inputs.bump != 'none'
        uses: actions/download-artifact@v4
        with:
          name: bumped-pubspecs
          path: flutter

      - uses: dart-lang/setup-dart@v1

      - name: Install dcli
        run: dart pub global activate dcli

      - name: Resolve release tool dependencies
        run: dart pub get
        working-directory: flutter/release

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        working-directory: flutter
        env:
          DOCKER_BUILDKIT: "1"
          DOCKER_REGISTRY: ghcr.io/growerp
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dart release/release_tool.dart --ci --bump=none --workspace=local --push-docker --apps=${{ matrix.app }}

      - name: Upload success marker
        if: success()
        run: echo "${{ matrix.app }}" > /tmp/${{ matrix.app }}.txt

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: success-${{ matrix.app }}
          path: /tmp/${{ matrix.app }}.txt

  # ───────────────────────────────────────────────────────────────────────────
  # 4. Build and push growerp-moqui backend Docker image
  # ───────────────────────────────────────────────────────────────────────────
  build-moqui:
    needs: prepare
    if: needs.prepare.outputs.include_moqui == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules (SSH → HTTPS rewrite)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - name: Set up backend symlinks
        run: bash setup-backend.sh

      - name: Download bumped pubspecs
        if: inputs.bump != 'none'
        uses: actions/download-artifact@v4
        with:
          name: bumped-pubspecs
          path: flutter

      - uses: dart-lang/setup-dart@v1

      - name: Install dcli
        run: dart pub global activate dcli

      - name: Resolve release tool dependencies
        run: dart pub get
        working-directory: flutter/release

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push growerp-moqui
        working-directory: flutter
        env:
          DOCKER_BUILDKIT: "1"
          DOCKER_REGISTRY: ghcr.io/growerp
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dart release/release_tool.dart --ci --bump=none --workspace=local --push-docker --apps=growerp-moqui

      - name: Upload success marker
        if: success()
        run: echo "growerp-moqui" > /tmp/growerp-moqui.txt

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: success-growerp-moqui
          path: /tmp/growerp-moqui.txt

  # ───────────────────────────────────────────────────────────────────────────
  # 5. Single git commit covering all successful image pushes
  # ───────────────────────────────────────────────────────────────────────────
  commit:
    needs: [prepare, build-image, build-moqui]
    runs-on: ubuntu-latest
    if: always() && needs.prepare.result == 'success' && inputs.bump != 'none' && (needs.build-image.result == 'success' || needs.build-image.result == 'skipped') && (needs.build-moqui.result == 'success' || needs.build-moqui.result == 'skipped')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bumped pubspecs
        uses: actions/download-artifact@v4
        with:
          name: bumped-pubspecs
          path: flutter

      - name: Download success markers
        uses: actions/download-artifact@v4
        with:
          pattern: success-*
          merge-multiple: true
          path: /tmp/build-success
        continue-on-error: true

      - name: Configure git
        run: |
          git config user.email "github-actions@growerp.com"
          git config user.name "GitHub Actions"
          git remote set-url origin \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Commit version bump
        run: |
          SUCCEEDED=$(ls /tmp/build-success/*.txt 2>/dev/null \
            | xargs -I{} basename {} .txt | sort | tr '\n' ', ' | sed 's/, $//')
          MSG="chore: update staging — ${{ inputs.bump }} bump"
          if [ -n "$SUCCEEDED" ]; then
            MSG="$MSG — images pushed: $SUCCEEDED"
          fi
          if [ -n "${{ inputs.comment }}" ]; then
            MSG="$MSG — ${{ inputs.comment }}"
          fi
          git add flutter/**/pubspec.yaml
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "$MSG"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD

      - name: Summary
        if: always()
        run: |
          echo "## Update Staging Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for app in admin elearner freelance health hotel support growerp-moqui; do
            if [ -f "/tmp/build-success/${app}.txt" ]; then
              echo "- ✅ $app" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ❌ $app" >> $GITHUB_STEP_SUMMARY
            fi
          done
