name: Copy Staging to Production

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App to sync (all = every changed service)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - moqui
          - admin
          - support
          - hotel
          - freelance
          - marketing
          - rental
          - agents

concurrency:
  group: stage-to-production
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Sync staging to production on growerp.com
        uses: appleboy/ssh-action@v1
        with:
          host: growerp.com
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: server/swarm/sync-to-prod.sh ${{ inputs.app }} --apply
