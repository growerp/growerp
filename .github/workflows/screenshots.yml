name: Store Screenshots

# Capture hotel app screenshots on Linux desktop (3 device sizes) and
# apply Fastlane frameit device frames. The framed PNGs are uploaded as
# a downloadable workflow artifact.
#
# Usage: trigger manually via workflow_dispatch. The framed-screenshots
# artifact is available for 7 days after each run.

on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Apps to screenshot (currently only "hotel" supported)'
        required: false
        default: "hotel"

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Take raw screenshots — 3 device sizes run in parallel
  # ──────────────────────────────────────────────────────────────────────────
  take-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: phone
            width: 412
            height: 892
            frame: "Pixel 4"
          - device: tablet7
            width: 600
            height: 960
            frame: "Nexus 7 2012"
          - device: tablet10
            width: 800
            height: 1280
            frame: "Nexus 10"

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules (SSH → HTTPS rewrite)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive

      - name: Set up backend component symlinks
        run: bash setup-backend.sh

      # ── Build Moqui backend image ──────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build Moqui backend image
        run: |
          mkdir -p moqui/build
          cd moqui && ./gradlew build getPostgresJdbc
          cd docker/simple && bash docker-build.sh ../.. growerp/growerp-moqui eclipse-temurin:21-jdk

      # ── Build Flutter test runner image (layer-cached) ────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Flutter test runner image
        uses: docker/build-push-action@v5
        with:
          context: flutter
          file: flutter/ci/Dockerfile
          load: true
          tags: growerp/flutter-test-runner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Start backend ──────────────────────────────────────────────────────
      - name: Start Moqui backend
        working-directory: flutter
        run: docker compose -f ci/docker-compose-screenshot.yml up -d moqui-database moqui

      - name: Wait for Moqui to be healthy
        working-directory: flutter
        run: |
          echo "Waiting for Moqui backend..."
          TIMEOUT=180
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if docker compose -f ci/docker-compose-screenshot.yml exec -T moqui \
                curl -sf http://localhost/status 2>/dev/null; then
              echo "Moqui is ready"
              break
            fi
            echo "Waiting... ($ELAPSED/$TIMEOUT seconds)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "ERROR: Moqui not ready after $TIMEOUT seconds"
            docker compose -f ci/docker-compose-screenshot.yml logs moqui
            exit 1
          fi

      # ── Run screenshot test ────────────────────────────────────────────────
      - name: Take screenshots (${{ matrix.device }})
        working-directory: flutter
        env:
          SCREEN_WIDTH: ${{ matrix.width }}
          SCREEN_HEIGHT: ${{ matrix.height }}
        run: |
          SCREEN_WIDTH=$SCREEN_WIDTH SCREEN_HEIGHT=$SCREEN_HEIGHT \
            docker compose -f ci/docker-compose-screenshot.yml up \
              --exit-code-from sut sut

      # ── Rename with device prefix (e.g. phone-mainmenu.png) ───────────────
      - name: Prefix screenshots with device name
        run: |
          SHOTS_DIR="flutter/packages/hotel/screenshots"
          if [ -d "$SHOTS_DIR" ]; then
            for f in "$SHOTS_DIR"/*.png; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              mv "$f" "$SHOTS_DIR/${{ matrix.device }}-$base"
            done
            echo "Screenshots after rename:"
            ls -lh "$SHOTS_DIR"
          else
            echo "WARNING: no screenshots directory found at $SHOTS_DIR"
          fi

      - name: Upload raw screenshots (${{ matrix.device }})
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.device }}
          path: flutter/packages/hotel/screenshots/${{ matrix.device }}-*.png
          if-no-files-found: warn
          retention-days: 3

      - name: Tear down Docker services
        if: always()
        working-directory: flutter
        run: docker compose -f ci/docker-compose-screenshot.yml down -v

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Apply device frames with Fastlane frameit and upload as artifact.
  #    publish-to-stores downloads this artifact when update_metadata: true.
  # ──────────────────────────────────────────────────────────────────────────
  frame-screenshots:
    needs: take-screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download all raw screenshots
        uses: actions/download-artifact@v4
        with:
          pattern: screenshots-*
          path: screenshots/
          merge-multiple: true

      - name: List downloaded screenshots
        run: ls -lh screenshots/

      - name: Install Fastlane
        run: sudo gem install fastlane --no-document

      - name: Write Framefile.json
        working-directory: screenshots
        run: |
          cat > Framefile.json << 'EOF'
          {
            "device_frame_version": "latest",
            "default": {
              "background": "#FFFFFF",
              "padding": 50,
              "show_complete_frame": false,
              "stack_title": false,
              "title_below_image": false
            },
            "data": [
              { "filter": "phone-",   "frame": "Pixel 4"      },
              { "filter": "tablet7-", "frame": "Nexus 7 2012" },
              { "filter": "tablet10-","frame": "Nexus 10"     }
            ]
          }
          EOF

      - name: Run frameit
        working-directory: screenshots
        run: fastlane frameit || { echo "frameit non-zero — listing output:"; ls -la; }

      - name: List framed screenshots
        run: find screenshots/ -name "*.png" | sort

      # ── Generate _preview.html ──────────────────────────────────────────────
      - name: Generate preview HTML
        working-directory: screenshots
        run: |
          python3 - << 'PYEOF'
          import glob

          files = sorted(f for f in glob.glob("*.png"))
          imgs  = "".join(f'<img src="{f}" alt="{f}" />' for f in files)
          html  = f"""<!--suppress ALL --><html lang="en"><head><title>Framed Screenshots</title>
          <style>
            :root {{ --height: 600; }}
            body {{ background-color: #efefef; }}
            img  {{ max-height: calc(var(--height) * 1px); margin-left: 16px; }}
            input {{ width: 400px; }}
          </style>
          <script>
          document.addEventListener('DOMContentLoaded', function () {{
            let h = document.getElementById('height');
            document.documentElement.style.setProperty('--height', h.value);
            h.addEventListener('input', () =>
              document.documentElement.style.setProperty('--height', h.value));
          }});
          </script>
          </head>
          <div><label for="height">Preview Height:</label>
          <input type="range" min="100" max="2000" value="600" id="height" /></div>
          <h1>Framed Screenshots</h1>{imgs}<body></body></html>"""

          with open("_preview.html", "w") as fh:
              fh.write(html)
          print(f"Generated _preview.html ({len(files)} images)")
          PYEOF

      # Artifact retention: 90 days so publish-to-stores can pick it up later.
      - name: Upload framed-screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: framed-screenshots
          path: |
            screenshots/*_framed.png
            screenshots/_preview.html
          if-no-files-found: warn
          retention-days: 90

      - name: Summary
        run: |
          TOTAL=$(find screenshots/ -name "*_framed.png" 2>/dev/null | wc -l)
          echo "## Store Screenshot Results" >> "$GITHUB_STEP_SUMMARY"
          echo "$TOTAL framed PNGs produced." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run **Publish to Stores** with \`update_metadata: true\` to upload them to the stores." >> "$GITHUB_STEP_SUMMARY"
